name: Build

on:
  push:
    branches: [ master ]
  workflow_dispatch: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        # NOTE: if the build ever needs env vars baked in at build time,
        # add them as repo secrets and pass them here, e.g.:
        # env:
        #   VITE_SOME_KEY: ${{ secrets.VITE_SOME_KEY }}

      - name: Build
        run: bun run build   # runs `vite build` -> dist/

      - name: Zip dist
        run: |
          cd dist
          zip -r ../eztnow-gui-dist.zip .
          cd ..

      - name: Upload run artifact (for manual inspection)
        uses: actions/upload-artifact@v4
        with:
          name: eztnow-gui-dist
          path: eztnow-gui-dist.zip
          retention-days: 14

      - name: Publish / update rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build (${{ github.sha }})"
          body: "Automatically built from commit ${{ github.sha }} on ${{ github.ref_name }}."
          prerelease: true
          make_latest: false
          files: eztnow-gui-dist.zip
